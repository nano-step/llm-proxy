general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_model_in_db: true
litellm_settings:
  num_retries: 2
  request_timeout: 120
  allowed_fails: 3
  cooldown_time: 30
  redis_host: 127.0.0.1
  redis_port: 6379
  redis_db: 0
  redis_timeout: 10
  redis_url: redis://127.0.0.1:6379/0
  callbacks:
  - gitlab_token_callback.proxy_handler_instance
  - token_logger.token_logger_instance
  - secret_guardrail.guardrail_instance
guardrails:
- guardrail_name: hide-secrets
  litellm_params:
    guardrail: hide-secrets
    mode: pre_call
model_list:
- model_name: gitlab/claude-sonnet-4-6
  litellm_params:
    model: anthropic/claude-sonnet-4-6
    api_base: https://cloud.gitlab.com/ai/v1/proxy/anthropic
    api_key: gitlab-oidc
    fallbacks: &id001
    - openai/claude-opus-4-6-thinking: []
    - openai/claude-sonnet-4-6: []
    - openai/gemini-3.1-pro-high: []
    - openai/gemini-3-flash-preview: []
    - openai/qwen3-coder-plus: []
    num_retries: 2
