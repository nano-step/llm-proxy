general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_model_in_db: true
  disable_prisma_schema_update: true
litellm_settings:
  drop_params: true
  modify_params: true
  num_retries: 5
  request_timeout: 120
  allowed_fails: 10
  cooldown_time: 120
  retry_after: 30
  timeout: 180
  callbacks:
  - gitlab_token_callback.proxy_handler_instance
  - secret_guardrail.guardrail_instance
  # - fallback_fixer.fallback_fixer_instance  # disabled
  # - fallback_fixer.fallback_fixer_instance  # disabled with fallbacks
guardrails:
- guardrail_name: hide-secrets
  litellm_params:
    guardrail: hide-secrets
    mode: pre_call
router_settings:
  model_group_alias:
    "claude-sonnet-4-6": "gitlab/claude-sonnet-4-6"
    "claude-opus-4-6": "gitlab/claude-opus-4-6"
    "claude-sonnet-4-5": "gitlab/claude-sonnet-4-5"
    "claude-sonnet-4-5-20250929": "gitlab/claude-sonnet-4-5"
    "claude-opus-4-5": "gitlab/claude-opus-4-5"
    "claude-opus-4-5-20251101": "gitlab/claude-opus-4-5"
    "claude-haiku-4-5": "gitlab/claude-haiku-4-5"
    "claude-haiku-4-5-20251001": "gitlab/claude-haiku-4-5"
