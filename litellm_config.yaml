general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_model_in_db: true

litellm_settings:
  num_retries: 2
  request_timeout: 60
  allowed_fails: 3
  cooldown_time: 30
  callbacks:
    - gitlab_token_callback.proxy_handler_instance
    - token_logger.token_logger_instance
    - secret_guardrail.guardrail_instance

guardrails:
  - guardrail_name: hide-secrets
    litellm_params:
      guardrail: hide-secrets
      mode: pre_call

model_list:
  - model_name: gitlab/claude-sonnet-4-6
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_base: https://cloud.gitlab.com/ai/v1/proxy/anthropic
      api_key: gitlab-oidc
      fallbacks: [{"openai/qwen3-coder-plus": []}]
      num_retries: 2

  - model_name: gitlab/claude-opus-4-6
    litellm_params:
      model: anthropic/claude-opus-4-6
      api_base: https://cloud.gitlab.com/ai/v1/proxy/anthropic
      api_key: gitlab-oidc
      fallbacks: [{"openai/qwen3-coder-plus": []}]
      num_retries: 2

  - model_name: gitlab/claude-sonnet-4-5
